        <div class="w-full max-w-[1110px] mx-auto px-5">
            <div class="pt-[60px]">
                <div class="block mb-5">
                    <h1 class="font-geist text-[32px] font-bold text-[#002C5C]">Job Application Tracker</h1>
                </div>
                <div class="w-full grid grid-cols-1 sm:grid-cols-3 gap-4">
                    <div class="w-full p-5 space-y-2 bg-[#FFFFFF] border border-[#F1F2F4] rounded-lg">
                        <p class="font-geist text-sm font-medium text-[#323B49]">Total</p>
                        <span id="total-jobs" class="font-geist text-2xl font-bold text-[#002C5C]">0</span>
                    </div>
                    <div class="w-full p-5 space-y-2 bg-[#FFFFFF] border border-[#F1F2F4] rounded-lg">
                        <p class="font-geist text-sm font-medium text-[#323B49]">Interview</p>
                        <span id="total-interview" class="font-geist text-2xl font-bold text-[#10B981]">0</span>
                    </div>
                    <div class="w-full p-5 space-y-2 bg-[#FFFFFF] border border-[#F1F2F4] rounded-lg">
                        <p class="font-geist text-sm font-medium text-[#323B49]">Rejected</p>
                        <span id="total-rejected" class="font-geist text-2xl font-bold text-[#EF4444]">0</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

                    <p class="font-geist text-base font-medium text-[#64748B]"><span id="total-jobs">0</span> jobs</p>
                </div>
                <div class="w-full flex items-center justify-start gap-2 mb-4">
                    <button class="w-20 py-2 px-3 bg-[#3B82F6] border border-[#3B82F6] font-geist text-[12px] font-semibold text-[#FFFFFF] rounded-sm cursor-pointer">All</button>
                    <button class="w-20 py-2 px-2 bg-[#FFFFFF] border border-[#F1F2F4] font-geist text-[12px] font-semibold text-[#64748B] rounded-sm cursor-pointer">Interview</button>
                    <button class="w-20 py-2 px-2 bg-[#FFFFFF] border border-[#F1F2F4] font-geist text-[12px] font-semibold text-[#64748B] rounded-sm cursor-pointer">Rejected</button>
