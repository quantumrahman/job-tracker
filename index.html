<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- title ------------------------------- -->
    <title>Job Tracker</title>
    <!-- google font ------------------------- -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- font awesome ------------------------ -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- css link ---------------------------- -->
    <link rel="stylesheet" href="./css/style.css">
    <!-- tailwind css ------------------------ -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-[#f7fafc]">
    <!-- header ------------------------------ -->
    <header class="w-full min-h-auto">
        <div class="w-full max-w-[1110px] mx-auto px-5">
            <div class="pt-[60px]">
                <div class="block mb-5">
                    <h1 class="font-geist text-[32px] font-bold text-[#002C5C]">Job Application Tracker</h1>
                </div>
                <div class="w-full grid grid-cols-1 sm:grid-cols-3 gap-4">
                    <div class="w-full p-5 space-y-2 bg-[#FFFFFF] border border-[#F1F2F4] rounded-lg">
                        <p class="font-geist text-sm font-medium text-[#323B49]">Total</p>
                        <span class="font-geist text-2xl font-bold text-[#002C5C]">8</span>
                    </div>
                    <div class="w-full p-5 space-y-2 bg-[#FFFFFF] border border-[#F1F2F4] rounded-lg">
                        <p class="font-geist text-sm font-medium text-[#323B49]">Interview</p>
                        <span class="font-geist text-2xl font-bold text-[#10B981]">0</span>
                    </div>
                    <div class="w-full p-5 space-y-2 bg-[#FFFFFF] border border-[#F1F2F4] rounded-lg">
                        <p class="font-geist text-sm font-medium text-[#323B49]">Rejected</p>
                        <span class="font-geist text-2xl font-bold text-[#EF4444]">0</span>
                    </div>
                </div>
            </div>
        </div>
    </header>
    <!-- script link ------------------------- -->
    <script src="./script/app.js"></script>
</body>
</html>
